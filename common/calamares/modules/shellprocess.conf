# common/calamares/modules/shellprocess.conf
---
dontChroot: false
timeout: 60
name: "Finalizing Duff-Linux System"
script:
    - "mkdir -p /boot/efi"
    
    # --- 1. Installer Cleanup ---
    # Removes the installer and its autostart icon from the target system
    - "xbps-remove -Fy calamares"
    - "rm -f /etc/skel/.config/autostart/calamares.desktop"
    - "rm -rf /usr/share/calamares"
    
    # --- 2. Dependency Check ---
    - "xbps-install -Sy snapper cronie grub-btrfs dbus"
    
    # --- 3. The DBus Chroot Workaround ---
    # Required for Snapper to communicate inside the Calamares environment
    - "mkdir -p /run/dbus"
    - "dbus-uuidgen --ensure"
    - "dbus-daemon --system --fork --print-pid > /run/chroot-dbus.pid"
    
    # --- 4. Snapper Configuration & Baseline ---
    - "snapper -c root create-config /"
    - "chmod a+rx /.snapshots"
    # Create the very first snapshot so 'snapper list' isn't empty
    - "snapper -c root create --description 'Baseline Installation' --cleanup-algorithm number"
    
    # --- 5. Tweak Snapper Settings ---
    # Disables hourly snapshots (Timeline) to save resources
    - "sed -i 's/TIMELINE_CREATE=\"yes\"/TIMELINE_CREATE=\"no\"/' /etc/snapper/configs/root"
    # Limits snapshots to the last 10 versions to save disk space
    - "sed -i 's/NUMBER_LIMIT=\"50\"/NUMBER_LIMIT=\"10\"/' /etc/snapper/configs/root"
    - "sed -i 's/NUMBER_LIMIT_IMPORTANT=\"10\"/NUMBER_LIMIT_IMPORTANT=\"5\"/' /etc/snapper/configs/root"
    
# --- 6. Install the XBPS Wrapper ---
    - "mv /usr/bin/xbps-install /usr/bin/xbps-install.real"
    - |
        printf '#!/bin/sh
        # 1. Skip snapshots for help or simple syncs
        case "$*" in
            *"-h"*|*"--help"*) exec /usr/bin/xbps-install.real "$@" ;;
            *"-Sy"|*"-S") exec /usr/bin/xbps-install.real "$@" ;;
        esac

        # 2. Take a snapshot for actual changes
        snapper -c root create --description "Before XBPS: $*" --cleanup-algorithm number

        # 3. Run the real command and pipe the exit code to a temp file
        /usr/bin/xbps-install.real "$@"
        echo $? > /tmp/xbps_exit_status

        # 4. Update GRUB
        grub-mkconfig -o /boot/grub/grub.cfg > /dev/null 2>&1

        # 5. Read the exit code back and exit
        exit $(cat /tmp/xbps_exit_status)
        ' > /usr/bin/xbps-install
    - "chmod +x /usr/bin/xbps-install"
    
    # --- 7. Cleanup DBus ---
    - "kill $(cat /run/chroot-dbus.pid)"
    - "rm /run/chroot-dbus.pid"
    
    # --- 8. Final Boot Config ---
    # Ensures the new snapshots are visible in the GRUB boot menu
    - "mkdir -p /boot/grub"
    - "grub-mkconfig -o /boot/grub/grub.cfg"