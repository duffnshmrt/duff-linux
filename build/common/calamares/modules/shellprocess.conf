# common/calamares/modules/shellprocess.conf
---
dontChroot: false
timeout: 600
name: "Finalizing Duff-Linux System"
script:
    # Installer Cleanup ---
    - "xbps-remove -Fy calamares"
    - "rm -f /etc/skel/.config/autostart/calamares.desktop"
    - "rm -rf /usr/share/calamares"
    - "rm -f /home/*/.config/autostart/calamares.desktop"

    # Btrfs & GRUB Stability Fixes ---
    - "find /boot -maxdepth 1 -type f -exec cp -p --sparse=never {} {}.tmp \\; -exec mv -f {}.tmp {} \\;"
    - "echo 'GRUB_PRELOAD_MODULES=\"btrfs zstd\"' >> /etc/default/grub"
    - "sed -i 's/GRUB_CMDLINE_LINUX_DEFAULT=\"/GRUB_CMDLINE_LINUX_DEFAULT=\"rootflags=subvol=@ /' /etc/default/grub"
    - "grep -q '^GRUB_DISABLE_OS_PROBER=' /etc/default/grub || echo 'GRUB_DISABLE_OS_PROBER=true' >> /etc/default/grub"
    
    # Dependency Check ---
    - "xbps-install -Sy snapper cronie grub-btrfs dbus"

    # GPU-Specific Finalization ---
    - |
        if [ -f /etc/duff-linux/gpu-profile ] && grep -qx 'nvidia' /etc/duff-linux/gpu-profile; then
            grep -q 'nvidia-drm.modeset=1' /etc/default/grub || \
                sed -i 's/GRUB_CMDLINE_LINUX_DEFAULT=\"/GRUB_CMDLINE_LINUX_DEFAULT=\"nvidia-drm.modeset=1 /' /etc/default/grub
        fi

    # The DBus Chroot Workaround ---
    - "mkdir -p /run/dbus"
    - "dbus-uuidgen --ensure"
    - "dbus-daemon --system --fork --print-pid > /run/chroot-dbus.pid"

    # Snapper Configuration & Baseline ---
    - "umount /.snapshots"
    - "rm -rf /.snapshots"
    - "snapper -c root create-config /"
    - "btrfs subvolume delete /.snapshots"
    - "mkdir /.snapshots"
    - "mount /.snapshots"
    - "chmod a+rx /.snapshots"
    - "snapper -c root create --description 'Baseline Installation' --cleanup-algorithm number"
    
    # Wire Core Services into Runit Stage 1 ---
    # Void Linux's /etc/runit/1 does not source core-services by default.
    # Use awk to insert the hook before the runsvdir line (avoids sed syntax issues).
    - |
        if ! grep -q 'run-core-services' /etc/runit/1; then
            awk '/runsvdir/ && !p {print ". /etc/runit/run-core-services.sh"; p=1} {print}' \
                /etc/runit/1 > /tmp/runit1.new && \
            mv /tmp/runit1.new /etc/runit/1 && \
            chmod 755 /etc/runit/1
        fi

    # Install the Parser-Proof XBPS Wrapper ---
    - "mkdir -p /usr/local/bin"
    - |
        cat <<'EOF' | awk '{gsub(/__D__/, sprintf("%c",36)); sub(/^        /,""); print}' > /usr/local/bin/xbps-install
                #!/bin/sh
                REAL=/usr/bin/xbps-install

                should_manage_snapshots() {
                    command -v snapper >/dev/null 2>&1 || return 1
                    command -v findmnt >/dev/null 2>&1 || return 1
                    [ -d /.snapshots ] || return 1

                    ROOT_FSTYPE=__D__(findmnt -n -o FSTYPE / 2>/dev/null)
                    ROOT_SUBVOL=__D__(findmnt -n -o OPTIONS / 2>/dev/null | tr ',' '\n' | sed -n 's/^subvol=//p' | head -n 1)

                    case "__D__ROOT_FSTYPE:__D__ROOT_SUBVOL" in
                        btrfs:/@|btrfs:@) return 0 ;;
                    esac

                    return 1
                }

                should_snapshot=0
                explicit_root=0
                skip_next=0

                for arg in "__D__@"; do
                    if [ "__D__skip_next" -eq 1 ]; then
                        skip_next=0
                        continue
                    fi

                    case "__D__arg" in
                        -h|--help)
                            exec "__D__REAL" "__D__@"
                            ;;
                        -r|--rootdir|-c|--cachedir|-C|--config|-R|--repository)
                            [ "__D__arg" = "-r" ] || [ "__D__arg" = "--rootdir" ] && explicit_root=1
                            skip_next=1
                            ;;
                        --rootdir=*)
                            explicit_root=1
                            ;;
                        --cachedir=*|--config=*|--repository=*)
                            ;;
                        -*)
                            case "__D__arg" in
                                *u*|*U*) should_snapshot=1 ;;
                            esac
                            ;;
                        *)
                            should_snapshot=1
                            ;;
                    esac
                done

                if [ "__D__explicit_root" -eq 1 ] || [ "__D__should_snapshot" -eq 0 ] || ! should_manage_snapshots; then
                    exec "__D__REAL" "__D__@"
                fi

                snapper -c root create --description "Before XBPS: __D__*" --cleanup-algorithm number
                "__D__REAL" "__D__@"
                status=__D__?

                if [ "__D__status" -eq 0 ]; then
                    grub-mkconfig -o /boot/grub/grub.cfg > /dev/null 2>&1
                fi

                exit "__D__status"
        EOF
    - "chmod +x /usr/local/bin/xbps-install"
    - |
        cat <<'EOF' | awk '{gsub(/__D__/, sprintf("%c",36)); sub(/^        /,""); print}' > /usr/local/bin/xbps-remove
                #!/bin/sh
                REAL=/usr/bin/xbps-remove

                should_manage_snapshots() {
                    command -v snapper >/dev/null 2>&1 || return 1
                    command -v findmnt >/dev/null 2>&1 || return 1
                    [ -d /.snapshots ] || return 1

                    ROOT_FSTYPE=__D__(findmnt -n -o FSTYPE / 2>/dev/null)
                    ROOT_SUBVOL=__D__(findmnt -n -o OPTIONS / 2>/dev/null | tr ',' '\n' | sed -n 's/^subvol=//p' | head -n 1)

                    case "__D__ROOT_FSTYPE:__D__ROOT_SUBVOL" in
                        btrfs:/@|btrfs:@) return 0 ;;
                    esac

                    return 1
                }

                should_snapshot=0
                explicit_root=0
                skip_next=0

                for arg in "__D__@"; do
                    if [ "__D__skip_next" -eq 1 ]; then
                        skip_next=0
                        continue
                    fi

                    case "__D__arg" in
                        -h|--help)
                            exec "__D__REAL" "__D__@"
                            ;;
                        -r|--rootdir|-C|--config)
                            [ "__D__arg" = "-r" ] || [ "__D__arg" = "--rootdir" ] && explicit_root=1
                            skip_next=1
                            ;;
                        --rootdir=*)
                            explicit_root=1
                            ;;
                        --config=*)
                            ;;
                        -*)
                            ;;
                        *)
                            should_snapshot=1
                            ;;
                    esac
                done

                if [ "__D__explicit_root" -eq 1 ] || [ "__D__should_snapshot" -eq 0 ] || ! should_manage_snapshots; then
                    exec "__D__REAL" "__D__@"
                fi

                snapper -c root create --description "Before XBPS Remove: __D__*" --cleanup-algorithm number
                "__D__REAL" "__D__@"
                status=__D__?

                if [ "__D__status" -eq 0 ]; then
                    grub-mkconfig -o /boot/grub/grub.cfg > /dev/null 2>&1
                fi

                exit "__D__status"
        EOF
    - "chmod +x /usr/local/bin/xbps-remove"

    # OctoXBPS Notifier PolicyKit Fix for Wrapped xbps-install ---
    - "mkdir -p /etc/polkit-1/rules.d"
    - "mkdir -p /etc/polkit-1/actions"
    - |
        cat <<'EOF' > /etc/polkit-1/rules.d/49-nopasswd_limited_xbps_install_sync.rules
        /* Allow members of the wheel group to execute the defined actions
         * without password authentication, similar to "sudo NOPASSWD:"
         */
        polkit.addRule(function(action, subject) {
            if ((action.id == "org.freedesktop.policykit.pkexec.run-xbpsinstall" ||
                 action.id == "org.freedesktop.policykit.pkexec.run-xbpsinstall-local") &&
                subject.isInGroup("wheel"))
            {
                return polkit.Result.YES;
            }
        });
        EOF
    - |
        cat <<'EOF' > /etc/polkit-1/actions/org.freedesktop.policykit.pkexec.run-xbpsinstall.policy
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE policyconfig PUBLIC
         "-//freedesktop//DTD PolicyKit Policy Configuration 1.0//EN"
         "http://www.freedesktop.org/standards/PolicyKit/1/policyconfig.dtd">
        <policyconfig>

          <action id="org.freedesktop.policykit.pkexec.run-xbpsinstall">
            <description>Run xbps-install sync via PolicyKit</description>
            <message>Authentication is required to sync XBPS package databases</message>
            <defaults>
              <allow_any>no</allow_any>
              <allow_inactive>no</allow_inactive>
              <allow_active>auth_admin</allow_active>
            </defaults>
            <annotate key="org.freedesktop.policykit.exec.path">/usr/bin/xbps-install</annotate>
            <annotate key="org.freedesktop.policykit.exec.argv1">-Sy</annotate>
          </action>

          <action id="org.freedesktop.policykit.pkexec.run-xbpsinstall-local">
            <description>Run wrapped xbps-install sync via PolicyKit</description>
            <message>Authentication is required to sync XBPS package databases</message>
            <defaults>
              <allow_any>no</allow_any>
              <allow_inactive>no</allow_inactive>
              <allow_active>auth_admin</allow_active>
            </defaults>
            <annotate key="org.freedesktop.policykit.exec.path">/usr/local/bin/xbps-install</annotate>
            <annotate key="org.freedesktop.policykit.exec.argv1">-Sy</annotate>
          </action>

        </policyconfig>
        EOF

    # OctoXBPS Notifier Plasma Wayland Tray Recovery ---
    - "mkdir -p /usr/local/bin"
    - |
        cat <<'EOF' | awk '{gsub(/__D__/, sprintf("%c",36)); sub(/^        /,""); print}' > /usr/local/bin/duff-plasma-tray-fix
        #!/bin/sh

        is_plasma_wayland() {
            [ "__D__{XDG_SESSION_TYPE:-}" = "wayland" ] || return 1

            case "__D__{XDG_CURRENT_DESKTOP:-}:__D__{DESKTOP_SESSION:-}" in
                *KDE*:*|*PLASMA*:*|*:*plasma*|*:*kde*)
                    return 0
                    ;;
            esac

            [ -n "__D__{KDE_FULL_SESSION:-}" ]
        }

        dbus_name_has_owner() {
            command -v dbus-send >/dev/null 2>&1 || return 1

            dbus-send --session --print-reply \
                --dest=org.freedesktop.DBus \
                /org/freedesktop/DBus \
                org.freedesktop.DBus.NameHasOwner \
                "string:__D__1" 2>/dev/null | grep -q "boolean true"
        }

        wait_for_plasma_tray() {
            count=0

            while [ "__D__count" -lt 60 ]; do
                if pgrep -x plasmashell >/dev/null 2>&1 && \
                   dbus_name_has_owner org.kde.StatusNotifierWatcher; then
                    return 0
                fi

                count=__D__((count + 1))
                sleep 1
            done

            return 0
        }

        log_file="__D__{XDG_RUNTIME_DIR:-/tmp}/octoxbps-notifier-session.log"

        log_message() {
            printf '%s %s\n' "__D__(date '+%Y-%m-%d %H:%M:%S')" "__D__*" >> "__D__log_file"
        }

        display_signature() {
            kscreen-doctor -j 2>/dev/null | tr -d '\n\t '
        }

        restart_plasmashell() {
            lockdir="__D__{XDG_RUNTIME_DIR:-/tmp}/duff-plasmashell-restart.lock"

            mkdir "__D__lockdir" 2>/dev/null || return 0

            (
                trap 'rmdir "__D__lockdir"' EXIT INT TERM HUP

                sleep 1

                if command -v systemctl >/dev/null 2>&1 && \
                   systemctl --user --quiet is-active plasma-plasmashell.service >/dev/null 2>&1; then
                    systemctl --user restart plasma-plasmashell.service >/dev/null 2>&1 && exit 0
                fi

                if command -v kquitapp6 >/dev/null 2>&1; then
                    kquitapp6 plasmashell >/dev/null 2>&1 || true
                else
                    pkill -x plasmashell >/dev/null 2>&1 || true
                fi

                sleep 1
                nohup plasmashell --replace >/dev/null 2>&1 &
            ) >/dev/null 2>&1 &
        }

        watch_display_changes() {
            notifier_pid=__D__1
            last_restart_at=0
            last_change_at=0

            command -v kscreen-doctor >/dev/null 2>&1 || return 0

            previous_signature=__D__(display_signature)
            [ -n "__D__previous_signature" ] || return 0

            sleep 15

            while kill -0 "__D__notifier_pid" 2>/dev/null; do
                sleep 2

                current_signature=__D__(display_signature)
                [ -n "__D__current_signature" ] || continue
                [ "__D__current_signature" = "__D__previous_signature" ] && continue

                now=__D__(date +%s)

                if [ __D__((now - last_change_at)) -lt 8 ]; then
                    previous_signature=__D__current_signature
                    continue
                fi

                last_change_at=__D__now
                previous_signature=__D__current_signature

                if [ __D__((now - last_restart_at)) -lt 300 ]; then
                    log_message "display change detected but plasmashell restart is rate-limited"
                    continue
                fi

                last_restart_at=__D__now
                log_message "display change detected; restarting plasmashell once"
                previous_signature=__D__current_signature
                restart_plasmashell
            done
        }

        run_notifier_session() {
            wait_for_plasma_tray
            existing_pids=__D__(pgrep -x octoxbps-notifier || true)

            if [ -n "__D__existing_pids" ]; then
                log_message "found pre-existing octoxbps-notifier instance(s): __D__existing_pids"
                pkill -x octoxbps-notifier 2>/dev/null || true
                sleep 2
            fi

            log_message "starting managed octoxbps-notifier instance"

            /usr/bin/octoxbps-notifier >> "__D__log_file" 2>&1 &
            notifier_pid=__D__!
            watcher_pid=

            if is_plasma_wayland; then
                watch_display_changes "__D__notifier_pid" &
                watcher_pid=__D__!
            fi

            wait "__D__notifier_pid"
            status=__D__?

            [ -n "__D__watcher_pid" ] && kill "__D__watcher_pid" 2>/dev/null || true

            log_message "managed octoxbps-notifier exited with status __D__status"
            return "__D__status"
        }

        run_notifier_session
        EOF
    - "chmod +x /usr/local/bin/duff-plasma-tray-fix"
    - "mkdir -p /etc/xdg/autostart"
    - |
        cat <<'EOF' > /etc/xdg/autostart/octoxbps-notifier.desktop
        [Desktop Entry]
        Type=Application
        Hidden=true
        EOF
    - |
        cat <<'EOF' > /etc/xdg/autostart/duff-octoxbps-notifier.desktop
        [Desktop Entry]
        Type=Application
        Name=OctoXBPS Notifier
        Comment=OctoXBPS system tray notifier
        Exec=/usr/local/bin/duff-plasma-tray-fix
        Icon=octoxbps
        Terminal=false
        Hidden=false
        X-KDE-autostart-after=panel
        X-KDE-autostart-phase=2
        StartupNotify=false
        EOF

    # Cleanup DBus & Finalize Bootloader ---
    - "kill $(cat /run/chroot-dbus.pid)"
    - "rm /run/chroot-dbus.pid"
    - "grub-mkconfig -o /boot/grub/grub.cfg"

    # Duff Linux Identity ---
    - |
        printf 'NAME="Duff Linux"\nID=duff-linux\nID_LIKE=void\nPRETTY_NAME="Duff Linux"\nANSI_COLOR="1;33"\nHOME_URL="https://github.com/duffnshmrt/duff-linux"\nSUPPORT_URL="https://github.com/duffnshmrt/duff-linux"\nBUG_REPORT_URL="https://github.com/duffnshmrt/duff-linux/issues"\nLOGO=duff-linux\n' > /etc/os-release

    # Fastfetch on terminal open (for users already created by Calamares) ---
    - |
        find /home /root -maxdepth 2 -name .bashrc | \
            xargs -r grep -L fastfetch 2>/dev/null | \
            xargs -r -I FNAME sh -c 'printf "\n[ -t 1 ] && fastfetch\n" >> FNAME'

    # Installed-system Duff Linux desktop icon asset ---
    - "mkdir -p /usr/share/icons/hicolor/256x256/apps"
    - "cp /usr/share/pixmaps/duff-linux.png /usr/share/icons/hicolor/256x256/apps/duff-linux.png"

    # Zram Swap ---
    - "ln -sf /etc/sv/zramen /etc/runit/runsvdir/default/zramen"
